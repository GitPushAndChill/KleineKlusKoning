<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Jaloezien montage in Hoofddorp</title>
  <desc id="desc">Visual van zwarte jaloezien die vakkundig zijn gemonteerd voor een raam in Hoofddorp.</desc>
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8e4de"/>
      <stop offset="100%" stop-color="#dbd5cd"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8d8e8"/>
      <stop offset="100%" stop-color="#daeef8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="900" fill="#173046"/>
  <rect x="80" y="80" width="1040" height="740" rx="36" fill="url(#wall)"/>
  <!-- Window opening -->
  <rect x="300" y="140" width="600" height="680" rx="6" fill="url(#sky)"/>
  <!-- Window frame -->
  <rect x="290" y="130" width="620" height="700" rx="8" fill="none" stroke="#d0ccc6" stroke-width="16"/>
  <!-- Outside greenery -->
  <ellipse cx="420" cy="760" rx="120" ry="60" fill="#5a9a4a" opacity="0.8"/>
  <ellipse cx="600" cy="780" rx="150" ry="55" fill="#4a8a3a" opacity="0.7"/>
  <ellipse cx="780" cy="760" rx="110" ry="58" fill="#5a9a4a" opacity="0.75"/>
  <!-- Jaloezie header rail (top) -->
  <rect x="280" y="130" width="640" height="32" rx="6" fill="#1a1a1a"/>
  <!-- Jaloezie slats -->
  <g fill="#1e1e1e">
    <rect x="290" y="168" width="620" height="14" rx="3"/>
    <rect x="290" y="192" width="620" height="14" rx="3"/>
    <rect x="290" y="216" width="620" height="14" rx="3"/>
    <rect x="290" y="240" width="620" height="14" rx="3"/>
    <rect x="290" y="264" width="620" height="14" rx="3"/>
    <rect x="290" y="288" width="620" height="14" rx="3"/>
    <rect x="290" y="312" width="620" height="14" rx="3"/>
    <rect x="290" y="336" width="620" height="14" rx="3"/>
    <rect x="290" y="360" width="620" height="14" rx="3"/>
    <rect x="290" y="384" width="620" height="14" rx="3"/>
    <rect x="290" y="408" width="620" height="14" rx="3"/>
    <rect x="290" y="432" width="620" height="14" rx="3"/>
    <rect x="290" y="456" width="620" height="14" rx="3"/>
    <rect x="290" y="480" width="620" height="14" rx="3"/>
    <rect x="290" y="504" width="620" height="14" rx="3"/>
    <rect x="290" y="528" width="620" height="14" rx="3"/>
  </g>
  <!-- Stacking at bottom -->
  <rect x="290" y="548" width="620" height="60" rx="4" fill="#1a1a1a"/>
  <!-- Lift cords -->
  <line x1="420" y1="162" x2="420" y2="614" stroke="#111111" stroke-width="3"/>
  <line x1="600" y1="162" x2="600" y2="614" stroke="#111111" stroke-width="3"/>
  <line x1="780" y1="162" x2="780" y2="614" stroke="#111111" stroke-width="3"/>
  <!-- Cord pull -->
  <circle cx="420" cy="622" r="8" fill="#111111"/>
  <!-- Light effect on slats -->
  <rect x="290" y="168" width="620" height="390" fill="#ffffff" opacity="0.04"/>
  <!-- Tilt cord -->
  <line x1="870" y1="162" x2="870" y2="720" stroke="#111111" stroke-width="2.5"/>
  <circle cx="870" cy="726" r="7" fill="#111111"/>
</svg>
