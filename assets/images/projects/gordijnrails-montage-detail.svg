<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Detailfoto gordijnrails montage in Hoofddorp</title>
  <desc id="desc">Illustratie van een detailopname van een netjes gemonteerde gordijnrails.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#18334c"/>
      <stop offset="100%" stop-color="#e3ecf1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" rx="44" fill="#13293b"/>
  <rect x="120" y="130" width="960" height="640" rx="34" fill="url(#bg)"/>
  <rect x="220" y="220" width="760" height="32" rx="16" fill="#314f6b"/>
  <circle cx="308" cy="236" r="16" fill="#f5a300"/>
  <circle cx="892" cy="236" r="16" fill="#f5a300"/>
  <rect x="282" y="252" width="140" height="350" rx="24" fill="#f4f0e8"/>
  <rect x="452" y="252" width="140" height="350" rx="24" fill="#d9dde1"/>
  <rect x="622" y="252" width="140" height="350" rx="24" fill="#e5cfa2"/>
  <rect x="792" y="252" width="120" height="350" rx="24" fill="#f4f0e8"/>
  <rect x="200" y="628" width="820" height="22" rx="11" fill="#9d7b52"/>
  <rect x="760" y="310" width="100" height="70" rx="22" fill="#ffffff" opacity="0.82"/>
  <text x="150" y="98" fill="#fff4df" font-family="Arial, sans-serif" font-size="42" font-weight="700">Detail van gordijnrails en beugels</text>
  <text x="150" y="820" fill="#2a425b" font-family="Arial, sans-serif" font-size="34">Extra foto van bevestiging, uitlijning en rustige raamafwerking</text>
</svg>