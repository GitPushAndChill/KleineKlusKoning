  <title id="title">Verlichting montage in Hoofddorp</title>
  <desc id="desc">Visual van gemonteerde plafond- en wandverlichting in een woonruimte.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#122131"/>
      <stop offset="100%" stop-color="#2a4e6d"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" rx="44" fill="url(#bg)"/>
  <rect x="120" y="120" width="960" height="660" rx="36" fill="#f7efe2"/>
  <rect x="250" y="210" width="700" height="430" rx="32" fill="#fffaf2"/>
  <rect x="585" y="180" width="30" height="120" rx="15" fill="#d7ab57"/>
  <circle cx="600" cy="350" r="112" fill="#ffd67f"/>
  <circle cx="600" cy="350" r="68" fill="#fff6d1"/>
  <rect x="330" y="360" width="120" height="34" rx="17" fill="#314f6b"/>
  <rect x="760" y="360" width="120" height="34" rx="17" fill="#314f6b"/>
  <circle cx="330" cy="377" r="44" fill="#f5a300"/>
  <circle cx="870" cy="377" r="44" fill="#f5a300"/>
