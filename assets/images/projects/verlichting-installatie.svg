  <text x="170" y="170" fill="#fff5df" font-family="Arial, sans-serif" font-size="42" font-weight="700">Plafondlamp en wandverlichting gemonteerd</text>
  <text x="170" y="735" fill="#304a67" font-family="Arial, sans-serif" font-size="36">Functionele verlichting met symmetrie, sfeer en een nette afwerking</text>
