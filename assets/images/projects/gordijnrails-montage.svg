<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Gordijnrails montage in Hoofddorp</title>
  <desc id="desc">Visual van een strak gemonteerde gordijnrails met interieurafwerking.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1dfc2"/>
      <stop offset="100%" stop-color="#d7ebf4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" rx="44" fill="#173046"/>
  <rect x="120" y="110" width="960" height="680" rx="38" fill="url(#bg)"/>
  <rect x="260" y="220" width="680" height="28" rx="14" fill="#314f6b"/>
  <circle cx="330" cy="234" r="13" fill="#f5a300"/>
  <circle cx="870" cy="234" r="13" fill="#f5a300"/>
  <rect x="310" y="248" width="120" height="370" rx="22" fill="#f4f0e8"/>
  <rect x="450" y="248" width="120" height="370" rx="22" fill="#cfd9dd"/>
  <rect x="590" y="248" width="120" height="370" rx="22" fill="#e4d0a4"/>
  <rect x="730" y="248" width="120" height="370" rx="22" fill="#f4f0e8"/>
  <rect x="240" y="618" width="720" height="18" rx="9" fill="#9d7b52"/>
  <rect x="180" y="660" width="840" height="62" rx="26" fill="#fff7ea" opacity="0.7"/>
  <text x="180" y="160" fill="#fff5df" font-family="Arial, sans-serif" font-size="42" font-weight="700">Gordijnrails en raamafwerking</text>
  <text x="200" y="705" fill="#28405a" font-family="Arial, sans-serif" font-size="36">Strakke uitlijning voor een rustige uitstraling in huis</text>
</svg>