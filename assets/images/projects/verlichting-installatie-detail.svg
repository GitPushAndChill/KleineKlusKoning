<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Detailfoto verlichting montage in Hoofddorp</title>
  <desc id="desc">Illustratie van een close-up van gemonteerde plafondlamp en wandverlichting.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#132536"/>
      <stop offset="100%" stop-color="#68849b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="900" rx="44" fill="url(#bg)"/>
  <rect x="140" y="130" width="920" height="640" rx="34" fill="#f7efe2"/>
  <rect x="250" y="210" width="700" height="430" rx="30" fill="#fffaf2"/>
  <rect x="588" y="170" width="24" height="120" rx="12" fill="#d7ab57"/>
  <circle cx="600" cy="336" r="92" fill="#ffd67f"/>
  <circle cx="600" cy="336" r="54" fill="#fff6d1"/>
  <rect x="320" y="336" width="110" height="28" rx="14" fill="#314f6b"/>
  <rect x="770" y="336" width="110" height="28" rx="14" fill="#314f6b"/>
  <circle cx="328" cy="350" r="46" fill="#f5a300"/>
  <circle cx="872" cy="350" r="46" fill="#f5a300"/>
  <rect x="320" y="610" width="560" height="18" rx="9" fill="#d0baa0"/>
  <circle cx="600" cy="336" r="160" fill="#ffd67f" opacity="0.18"/>
  <text x="150" y="98" fill="#fff4df" font-family="Arial, sans-serif" font-size="42" font-weight="700">Detail van verlichting en afmontage</text>
  <text x="150" y="818" fill="#304a67" font-family="Arial, sans-serif" font-size="34">Extra foto van symmetrische plaatsing en afgewerkte aansluitpunten</text>
</svg>